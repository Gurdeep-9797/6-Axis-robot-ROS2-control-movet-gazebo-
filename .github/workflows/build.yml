name: "Build & Release"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  # ── Online System: React + Docker ────────────────────────────────────
  build-online:
    name: Online System (React + ROS2)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: NEW_UI/remix-of-roboflow-studio/package-lock.json

      - name: Install Dependencies
        working-directory: NEW_UI/remix-of-roboflow-studio
        run: npm ci

      - name: Build React IDE
        working-directory: NEW_UI/remix-of-roboflow-studio
        run: npm run build

      - name: Validate Docker Compose
        run: docker compose config

      - name: Upload React Build
        uses: actions/upload-artifact@v4
        with:
          name: react-ide-build
          path: NEW_UI/remix-of-roboflow-studio/dist/
          if-no-files-found: error

  # ── Offline System: WPF Desktop Client ──────────────────────────────
  build-offline:
    name: Offline System (WPF .NET 8)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore src/RoboForge.Wpf/RoboForge.Wpf.csproj

      - name: Build WPF Client
        run: dotnet build src/RoboForge.Wpf/RoboForge.Wpf.csproj --configuration Debug --no-restore

      - name: Run Tests
        run: dotnet test src/RoboForge.Wpf/RoboForge.Wpf.csproj --no-build --verbosity normal

      - name: Publish Release
        run: dotnet publish src/RoboForge.Wpf/RoboForge.Wpf.csproj -c Release -o publish/ --self-contained false

      - name: Upload WPF Build
        uses: actions/upload-artifact@v4
        with:
          name: wpf-release
          path: publish/
          if-no-files-found: error

  # ── Deployment Package ───────────────────────────────────────────────
  create-package:
    name: Create Deployment Package
    needs: [build-online, build-offline]
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download React Build
        uses: actions/download-artifact@v4
        with:
          name: react-ide-build
          path: NEW_UI/remix-of-roboflow-studio/dist/

      - name: Download WPF Build
        uses: actions/download-artifact@v4
        with:
          name: wpf-release
          path: publish/

      - name: Create Deployment Package
        run: |
          powershell -ExecutionPolicy Bypass -File CREATE_DEPLOY_PACKAGE.ps1

      - name: Upload Deployment Package
        uses: actions/upload-artifact@v4
        with:
          name: roboforge-deploy-package
          path: deploy_package/
          if-no-files-found: error
