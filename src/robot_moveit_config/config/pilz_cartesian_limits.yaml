# PILZ Cartesian limits — required for pilz_industrial_motion_planner
# Used by LIN (linear) and CIRC (circular) planners to limit
# Cartesian velocity and acceleration of the TCP
cartesian_limits:
  max_trans_vel: 1.0      # m/s — maximum translational velocity
  max_trans_acc: 2.5      # m/s² — maximum translational acceleration  
  max_trans_dec: 2.5      # m/s² — maximum translational deceleration
  max_rot_vel: 1.57       # rad/s — maximum rotational velocity (~90 deg/s)
