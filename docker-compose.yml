version: '3.8'

services:
  # ── ROS 2 Core / Description ──────────────────────────────────────────
  ros_core:
    image: robotics_base:latest
    container_name: roboforge_core
    command: bash -c "source /opt/ros/humble/setup.bash && source /ros_ws/install/setup.bash && ros2 launch robot_description display.launch.py"
    environment:
      - ROS_DOMAIN_ID=42
    volumes:
      - ./src:/ros_ws/src
      - ./robot_description:/ros_ws/src/robot_description
      - ./robot_gazebo:/ros_ws/src/robot_gazebo
      - ./robot_moveit_config:/ros_ws/src/robot_moveit_config
    networks:
      - robot_net
    healthcheck:
      test: ["CMD", "bash", "-c", "source /opt/ros/humble/setup.bash && source /ros_ws/install/setup.bash && ros2 node list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MoveIt Motion Planning ────────────────────────────────────────────
  moveit:
    image: robotics_base:latest
    container_name: roboforge_moveit
    depends_on:
      ros_core:
        condition: service_healthy
    command: bash -c "source /opt/ros/humble/setup.bash && source /ros_ws/install/setup.bash && ros2 launch robot_moveit_config move_group.launch.py"
    environment:
      - ROS_DOMAIN_ID=42
    volumes:
      - ./src:/ros_ws/src
      - ./robot_description:/ros_ws/src/robot_description
      - ./robot_moveit_config:/ros_ws/src/robot_moveit_config
    networks:
      - robot_net

  # ── Gazebo Physics Sim ───────────────────────────────────────────────
  gazebo:
    image: robotics_base:latest
    container_name: roboforge_gazebo
    depends_on:
      - moveit
    command: bash -c "source /opt/ros/humble/setup.bash && source /ros_ws/install/setup.bash && ros2 launch robot_gazebo gazebo.launch.py"
    environment:
      - ROS_DOMAIN_ID=42
    volumes:
      - ./src:/ros_ws/src
      - ./robot_description:/ros_ws/src/robot_description
      - ./robot_gazebo:/ros_ws/src/robot_gazebo
    networks:
      - robot_net

  # ── WebSocket Bridge & Telemetry ──────────────────────────────────────
  bridge:
    image: robotics_base:latest
    container_name: roboforge_bridge
    depends_on:
      - moveit
      - gazebo
    command: bash -c "source /opt/ros/humble/setup.bash && source /ros_ws/install/setup.bash && ros2 run roboforge_bridge roboforge_bridge"
    ports:
      - "9090:9090"
    environment:
      - ROS_DOMAIN_ID=42
    volumes:
      - ./src:/ros_ws/src
    networks:
      - robot_net

  # ── React Online IDE (Frontend) ──────────────────────────────────────
  frontend:
    build:
      context: ./NEW_UI/remix-of-roboflow-studio
      dockerfile: Dockerfile
    container_name: roboforge_frontend
    ports:
      - "3000:5173"
    environment:
      - VITE_ROS_BRIDGE_URL=ws://localhost:9090
    depends_on:
      - bridge
    networks:
      - robot_net

networks:
  robot_net:
    driver: bridge
