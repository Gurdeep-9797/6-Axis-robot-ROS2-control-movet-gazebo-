<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RoboForge Web Dashboard</title>
    <style>
        body { background: #0B0F19; color: #E2E8F0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        .panel { background: rgba(13, 18, 28, 0.85); border: 1px solid #1E293B; border-radius: 8px; padding: 20px; backdrop-filter: blur(10px); max-width: 400px; margin: 0 auto; }
        h2 { color: #0EA5E9; margin-top: 0; }
        .row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
        .row span.val { color: #10B981; font-weight: bold; font-family: monospace; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; background: #1E293B; border: 1px solid #334155; color: white; padding: 10px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0EA5E9; border-color: #0EA5E9; }
        .live-tag { display: inline-block; padding: 4px 8px; background: rgba(16, 185, 129, 0.2); border: 1px solid #10B981; color: #10B981; border-radius: 4px; font-size: 12px; margin-bottom: 15px;}
        .status-disconnected { color: #EF4444; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>RoboForge Live Control</h2>
        <div class="live-tag">Online Sync Active</div>
        
        <div class="row"><span>Status:</span> <span class="val" id="status">Connecting...</span></div>
        <div class="row"><span>Running:</span> <span class="val" id="running">False</span></div>
        
        <hr style="border: 1px solid #1E293B; margin: 15px 0;">
        
        <div class="row"><span>Joint 1:</span> <input type="range" id="slipj1" min="-180" max="180" oninput="pushJoints()"/><span class="val" id="j1">0.00°</span></div>
        <div class="row"><span>Joint 2:</span> <input type="range" id="slipj2" min="-180" max="180" oninput="pushJoints()"/><span class="val" id="j2">0.00°</span></div>
        <div class="row"><span>Joint 3:</span> <input type="range" id="slipj3" min="-180" max="180" oninput="pushJoints()"/><span class="val" id="j3">0.00°</span></div>
        <div class="row"><span>Joint 4:</span> <input type="range" id="slipj4" min="-180" max="180" oninput="pushJoints()"/><span class="val" id="j4">0.00°</span></div>
        <div class="row"><span>Joint 5:</span> <input type="range" id="slipj5" min="-180" max="180" oninput="pushJoints()"/><span class="val" id="j5">0.00°</span></div>
        <div class="row"><span>Joint 6:</span> <input type="range" id="slipj6" min="-180" max="180" oninput="pushJoints()"/><span class="val" id="j6">0.00°</span></div>

        <div class="btn-group">
            <button onclick="sendCommand('run')">▶ Run</button>
            <button onclick="sendCommand('pause')">⏸ Pause</button>
        </div>
    </div>

    <script>
        let isDragging = false;
        const sliders = [1,2,3,4,5,6].map(i => document.getElementById(`slipj${i}`));

        async function fetchState() {
            if (isDragging) return; // Do not overwrite while user is dragging
            try {
                const res = await fetch('/api/state');
                const data = await res.json();
                
                const elStatus = document.getElementById('status');
                elStatus.innerText = data.status;
                if(data.status === 'Disconnected') elStatus.className = 'val status-disconnected';
                else elStatus.className = 'val';

                document.getElementById('running').innerText = data.isRunning ? 'True' : 'False';
                
                if (data.j1 !== undefined) {
                    for(let i=1; i<=6; i++) {
                        document.getElementById('j'+i).innerText = parseFloat(data['j'+i]).toFixed(2) + '°';
                        document.getElementById('slipj'+i).value = data['j'+i];
                    }
                }
            } catch (err) {
                document.getElementById('status').innerText = 'Offline';
            }
        }

        async function pushJoints() {
            isDragging = true;
            const j1 = sliders[0].value;
            const j2 = sliders[1].value;
            const j3 = sliders[2].value;
            const j4 = sliders[3].value;
            const j5 = sliders[4].value;
            const j6 = sliders[5].value;
            
            for(let i=1; i<=6; i++) {
                document.getElementById('j'+i).innerText = parseFloat(sliders[i-1].value).toFixed(2) + '°';
            }

            await fetch(`/api/joints?j1=${j1}&j2=${j2}&j3=${j3}&j4=${j4}&j5=${j5}&j6=${j6}`, { method: 'POST' });
            
            // Allow fetch loop to resume shortly after dragging stops
            clearTimeout(window.dragTimeout);
            window.dragTimeout = setTimeout(() => { isDragging = false; }, 500);
        }

        async function sendCommand(cmd) {
            await fetch(`/api/action/${cmd}`, { method: 'POST' });
            fetchState();
        }

        setInterval(fetchState, 300); // Live sync
        fetchState();
    </script>
</body>
</html>
